# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true

    imports:
      glob: "*.go"
      run: goimports -l -w {staged_files}
      stage_fixed: true

    lint:
      glob: "*.go"
      run: golangci-lint run --fix ./...
      stage_fixed: true

    vet:
      glob: "*.go"
      run: go vet ./...

    test:
      glob: "*.go"
      run: go test ./... -short -v

commit-msg:
  commands:
    commitlint:
      run: |
        # Simple commit message validation
        # Format: type(scope): subject
        # Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert

        MSG=$(cat {1})
        PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,100}$"

        if ! echo "$MSG" | grep -qE "$PATTERN"; then
          echo "❌ Invalid commit message format!"
          echo ""
          echo "Expected format: type(scope): subject"
          echo ""
          echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          echo ""
          echo "Examples:"
          echo "  feat(users): add user registration endpoint"
          echo "  fix(auth): resolve token expiration issue"
          echo "  docs: update README with setup instructions"
          echo ""
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    test:
      run: go test ./... -v

    build:
      run: go build -o /dev/null ./cmd/server
