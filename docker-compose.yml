# Development compose — hot reload via air, source mounted as a volume.
# Usage: docker compose up
#
# For production: docker compose -f docker-compose.prod.yml up

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: go-base-framework-api
    ports:
      - "3000:3000"
    # Load base config from .env; override service-internal addresses below.
    env_file:
      - .env
    environment:
      # Override host-local addresses with Docker service names.
      REDIS_ADDRESS: "redis:6379"
      DB_PATH: "/app/db/app.db"
    volumes:
      # Mount source for hot reload.
      - .:/app
      # Persist Go module and build caches across restarts — avoids re-downloading deps.
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: go-base-framework-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  go-mod-cache:
  go-build-cache:
